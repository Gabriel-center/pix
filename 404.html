<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador PIX</title>
<script>
// GitHub Pages serves this when /pix/<algo> isn't a real file.
// Grab the last segment (the value), stash it, and bounce to /pix/.
(function(){
 var parts = window.location.pathname.split("/").filter(Boolean);
 var valor = parts[parts.length-1];
 if(valor){ sessionStorage.setItem("pixValor", valor); }
 // redirect to the repo root page. Adjust "/pix/" if your repo name differs.
 window.location.replace("/pix/");
})();
</script>
</head>
<body></body>
</html>
