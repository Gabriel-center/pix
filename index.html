<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador PIX</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:16px;background:#f5f5f5}
.card{max-width:500px;margin:auto;background:white;padding:16px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
input,button,textarea{width:100%;box-sizing:border-box;padding:12px;margin-top:10px}
button{cursor:pointer}
#qrcode{display:flex;justify-content:center;margin-top:15px}
</style>
</head>
<body>
<div class="card">
<h2>Gerador PIX</h2>
<input id="valor" type="number" step="0.01" placeholder="Valor (R$)">
<button onclick="gerar()">Gerar PIX</button>
<textarea id="payload" rows="8" readonly></textarea>
<button id="copiarBtn" onclick="copiarPix()" style="display:none">Copiar código PIX</button><div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const chave="ec62f95f-d87f-4913-af63-a3d8a4b8ab4c";
const nome="Jonathas Gabriel Rodrigue";
const cidade="SAO PAULO";

function campo(id,valor){
 return id + String(valor.length).padStart(2,"0") + valor;
}

function crc16(str){
 let crc=0xFFFF;
 for(let c=0;c<str.length;c++){
   crc ^= str.charCodeAt(c)<<8;
   for(let i=0;i<8;i++){
     crc=(crc&0x8000)?((crc<<1)^0x1021):(crc<<1);
     crc&=0xFFFF;
   }
 }
 return crc.toString(16).toUpperCase().padStart(4,"0");
}

function txid(){
 const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
 let s="";
 for(let i=0;i<10;i++) s+=chars[Math.floor(Math.random()*chars.length)];
 return s;
}

function gerar(){
 const valor=Number(document.getElementById("valor").value||0).toFixed(2);

 const gui = campo("00","BR.GOV.BCB.PIX");
 const chavePix = campo("01",chave);
 const merchant = campo("26", gui+chavePix);

 const adicionais = campo("05",txid());
 const campo62 = campo("62", adicionais);

 let payload =
 "000201"+
 merchant+
 "52040000"+
 "5303986"+
 campo("54",valor)+
 "5802BR"+
 campo("59",nome)+
 campo("60",cidade)+
 campo62+
 "6304";

 payload += crc16(payload);

 document.getElementById("payload").value=payload;
 document.getElementById("copiarBtn").style.display="block";

 const qr=document.getElementById("qrcode");
 qr.innerHTML="";
 new QRCode(qr,{text:payload,width:250,height:250});
}

function copiarPix(){
 const payload=document.getElementById("payload").value;
 navigator.clipboard.writeText(payload).then(()=>{
   const btn=document.getElementById("copiarBtn");
   btn.innerText="✓ Copiado!";
   setTimeout(()=>btn.innerText="Copiar código PIX",2000);
 });
}

// Auto-fill from query string.
// Supports  ?20  ?20.50  ?20,50  and  ?v=20
(function(){
 let raw = "";
 const search = window.location.search.slice(1); // drop the "?"
 if(search){
   if(search.indexOf("v=")===0){
     raw = decodeURIComponent(search.slice(2));
   } else if(search.indexOf("=")===-1){
     raw = decodeURIComponent(search);
   } else {
     const p = new URLSearchParams(search);
     raw = p.get("v") || "";
   }
 }
 if(raw){
   raw = raw.replace(",", ".");
   const n = parseFloat(raw);
   if(!isNaN(n) && n > 0){
     document.getElementById("valor").value = n;
     gerar();
   }
 }
})();
</script>
</body>
</html>
